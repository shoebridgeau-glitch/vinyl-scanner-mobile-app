<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VinylShop — Mobile Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #07070a; --panel: #0f0f13; --card: #16161b; --border: #222229;
    --text: #e2e2ea; --muted: #55555f; --muted2: #3a3a44;
    --accent: #00e5d4; --accent2: #6e52ff; --red: #ff4d6d; --yellow: #f5c518;
  }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }

  /* ── Top Bar ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 20; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .topbar h1 { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
  .topbar h1 span { color: var(--accent); }
  .topbar-stats { display: flex; gap: 8px; align-items: center; }
  .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .stat-pill b { color: var(--accent); }
  .settings-btn { background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }

  /* ── Main Layout: Stacked for Mobile ── */
  .main-mobile { display: flex; flex-direction: column; flex: 1; overflow: hidden; }

  /* ── Camera Area (Top Half) ── */
  .cam-area { position: relative; height: 45vh; min-height: 300px; background: #000; flex-shrink: 0; overflow: hidden; }
  /* No mirroring for rear phone cameras! */
  video { width: 100%; height: 100%; object-fit: cover; background: #000; }
  .cam-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: none; }
  
  .target-ring { width: 75vw; height: 75vw; max-width: 320px; max-height: 320px; border-radius: 12px; border: 2px dashed var(--accent); opacity: .5; transition: all .3s; box-shadow: 0 0 0 9999px rgba(0, 0, 0, .4); }
  .target-ring.scanning { border-color: var(--red); animation: ringpulse 1s infinite; }
  .target-ring.auto-active { border-color: var(--yellow); border-style: solid; opacity: 0.8; }
  @keyframes ringpulse { 0%, 100% { opacity: .3; transform: scale(1) } 50% { opacity: 1; transform: scale(1.02) } }
  
  .cam-label { position: absolute; bottom: 20px; font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent); font-weight: 700; background: rgba(0, 0, 0, 0.6); padding: 6px 14px; border-radius: 20px; backdrop-filter: blur(4px); }
  .cam-label.scanning { color: var(--red); }
  
  .genre-flash { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity .05s; }
  .genre-flash.show { animation: flashIn .6s ease-out forwards; }
  @keyframes flashIn { 0% { opacity: .3 } 100% { opacity: 0 } }

  /* ── Thumb Controls Bar ── */
  .controls-bar { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border); z-index: 10; }
  
  .mode-toggle { display: flex; flex-direction: column; gap: 4px; }
  .mode-btn { background: var(--card); border: 1px solid var(--border); color: var(--muted); font-size: 10px; font-weight: 700; padding: 6px 12px; border-radius: 6px; cursor: pointer; transition: all 0.2s; width: 100px; text-align: left; }
  .mode-btn.active { background: rgba(0, 229, 212, 0.1); color: var(--accent); border-color: var(--accent); }
  
  .scan-btn-wrap { position: relative; }
  .scan-btn { width: 64px; height: 64px; border-radius: 50%; border: 3px solid var(--accent); background: rgba(0, 229, 212, .1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; color: var(--accent); transition: transform 0.1s; }
  .scan-btn:active { transform: scale(0.9); }
  .scan-btn.scanning { border-color: var(--red); background: rgba(255, 77, 109, .15); animation: ringpulse 1s infinite; pointer-events: none; }
  .scan-btn.auto-active { border-color: var(--yellow); background: rgba(245, 197, 24, .15); color: var(--yellow); }

  .auto-toggle { display: flex; flex-direction: column; gap: 4px; align-items: flex-end; }
  .auto-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 6px 12px; border-radius: 6px; cursor: pointer; width: 85px; text-align: center; }
  .auto-btn.active { background: rgba(245, 197, 24, 0.1); color: var(--yellow); border-color: var(--yellow); }

  /* ── Bottom List Area ── */
  .list-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--panel); }
  .tab-btn { flex: 1; padding: 14px 10px; background: transparent; border: none; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 11px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; background: var(--card); }

  .list-actions { display: flex; justify-content: space-between; padding: 8px 12px; background: var(--panel); border-bottom: 1px solid var(--border); }
  .btn-sm { padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 11px; font-weight: 600; }
  .btn-sm.accent { background: var(--accent); color: #000; border-color: var(--accent); }

  .scan-list-wrap { flex: 1; overflow-y: auto; padding-bottom: 20px; }
  
  .scan-item { display: flex; gap: 10px; padding: 12px; border-bottom: 1px solid var(--border); position: relative; background: var(--card); }
  .scan-item .bar { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; }
  .scan-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #000; }
  
  .scan-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
  .scan-artist { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scan-title { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scan-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 2px; }
  .badge { font-family: 'JetBrains Mono', monospace; font-size: 9px; padding: 3px 6px; border-radius: 4px; background: var(--panel); border: 1px solid var(--border); color: var(--text); }
  
  .scan-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; flex-shrink: 0; min-width: 60px; }
  .scan-price { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: var(--accent); text-align: right; }
  .icon-btn-group { display: flex; gap: 12px; }
  .icon-btn { background: transparent; border: none; color: var(--muted); font-size: 16px; padding: 4px; cursor: pointer; }

  .action-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .action-btn { font-family: 'JetBrains Mono', monospace; font-size: 10px; text-decoration: none; padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border); color: var(--text); background: var(--panel); }
  
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); text-align: center; padding: 20px; }
  .empty-state .icon { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
  .empty-state p { font-size: 12px; line-height: 1.6; font-family: 'JetBrains Mono', monospace; }

  /* ── Modals (Adapted for Mobile) ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden; }
  
  /* Edition Scroll List */
  .edition-scroll { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; margin: 16px 0; }
  .edition-btn { display: flex; align-items: center; gap: 12px; text-align: left; padding: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; }
  .edition-btn img { width: 60px; height: 60px; border-radius: 4px; object-fit: cover; background: #000; }
  .edition-info { display: flex; flex-direction: column; }
  .edition-info strong { color: var(--accent); font-size: 13px; }
  .edition-info span { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* Setup Inputs */
  .modal-card input { width: 100%; padding: 14px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px; }
  .modal-card .btn-primary { width: 100%; padding: 14px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-size: 15px; font-weight: 700; }

  /* Confirmation specific */
  .sc-edits { display: flex; gap: 10px; margin: 16px 0; }
  .sc-field { flex: 1; }
  .sc-field label { font-size: 10px; color: var(--muted); display: block; margin-bottom: 4px; }
  .sc-field input { margin-bottom: 0; padding: 10px; }
  .sc-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .sc-actions .full { grid-column: 1 / -1; }

  canvas#detectCanvas { position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; }
</style>
</head>
<body>

<div class="modal-overlay" id="setupModal">
  <div class="modal-card">
    <h2 style="margin-bottom:16px;text-align:center;">API Setup</h2>
    <label style="font-size:11px;color:var(--muted);margin-bottom:4px;">GEMINI API KEY <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:var(--accent);float:right;">Get Key</a></label>
    <input id="apiKeyInput" type="password" placeholder="AIza..." autocomplete="off"/>
    
    <label style="font-size:11px;color:var(--muted);margin-bottom:4px;">DISCOGS TOKEN <a href="https://www.discogs.com/settings/developers" target="_blank" style="color:var(--accent);float:right;">Get Token</a></label>
    <input id="discogsKeyInput" type="password" placeholder="Optional for pricing" autocomplete="off"/>
    
    <button class="btn-primary" onclick="startApp()">Start Scanner</button>
    <div id="setupErr" style="color:var(--red); font-size:12px; margin-top:10px; text-align:center;"></div>
  </div>
</div>

<div class="modal-overlay" id="editionModal">
  <div class="modal-card">
    <h3>Select Exact Pressing</h3>
    <div class="edition-scroll" id="editionList"></div>
    <button class="btn-primary" style="background:var(--panel); color:var(--text); border:1px solid var(--border);" id="editionSkipBtn">Skip & Auto-Pick</button>
  </div>
</div>

<div class="modal-overlay" id="scanConfirm">
  <div class="modal-card">
    <div style="display:flex; gap:16px; margin-bottom:16px;">
      <img id="scThumb" src="" style="width:80px; height:80px; border-radius:8px; object-fit:cover; background:#000;">
      <div style="display:flex; flex-direction:column; justify-content:center;">
        <strong id="scTitle" style="font-size:16px;">Artist - Title</strong>
        <span id="scMeta" style="font-size:12px; color:var(--muted); margin-top:4px;"></span>
      </div>
    </div>
    <div id="scBadges" style="display:flex; gap:6px; flex-wrap:wrap; margin-bottom:12px;"></div>
    
    <div class="sc-edits">
      <div class="sc-field"><label>Year</label><input id="scYear" type="number" placeholder="YYYY"></div>
      <div class="sc-field"><label>Country</label><input id="scCountry" type="text" placeholder="UK/US"></div>
    </div>

    <div class="sc-actions">
      <button class="btn-primary full" id="scAddBtn">Add to Inventory</button>
      <button class="btn-primary" style="background:var(--panel); color:var(--text); border:1px solid var(--border);" id="scRetryBtn">🔄 Retry</button>
      <button class="btn-primary" style="background:transparent; color:var(--red); border:1px solid var(--red);" id="scCancelBtn">✕ Discard</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🎵</div>
    <h1>Vinyl<span>Shop</span></h1>
  </div>
  <div class="topbar-stats">
    <div class="stat-pill"><b id="scanCount">0</b> items</div>
    <div class="stat-pill">$<b id="totalValue">0.00</b></div>
    <button class="settings-btn" onclick="document.getElementById('setupModal').classList.add('show')">⚙️</button>
  </div>
</div>

<div class="main-mobile">
  <div class="cam-area">
    <video id="video" autoplay muted playsinline></video>
    <div class="cam-overlay">
      <canvas id="detectCanvas"></canvas>
      <div class="target-ring" id="ring"></div>
      <div class="cam-label" id="camLabel">Tap Scan to begin</div>
    </div>
    <div class="genre-flash" id="genreFlash"></div>
    <canvas id="snapCanvas" style="display:none"></canvas>
  </div>

  <div class="controls-bar">
    <div class="mode-toggle">
      <button id="modeArtBtn" class="mode-btn active" onclick="setMode('ART')">🎨 Cover Art</button>
      <button id="modeTextBtn" class="mode-btn" onclick="setMode('TEXT')">📝 Label/Text</button>
    </div>
    
    <div class="scan-btn-wrap">
      <button class="scan-btn" id="scanBtn" onclick="toggleScan()">⏺</button>
    </div>

    <div class="auto-toggle">
      <button id="autoBtn" class="auto-btn" onclick="cycleAutoMode()">Auto: OFF</button>
      <button class="auto-btn" style="background:transparent; border:none; padding:2px;" onclick="doScan()">Snap Now</button>
    </div>
  </div>

  <div class="list-area">
    <div class="sidebar-tabs">
      <button class="tab-btn active" id="tabInvBtn" onclick="switchTab('INV')">Inventory (<span id="countInv">0</span>)</button>
      <button class="tab-btn" id="tabRevBtn" onclick="switchTab('REV')" style="color:var(--yellow)">Review (<span id="countRev">0</span>)</button>
    </div>
    
    <div class="list-actions" id="invControls">
      <button class="btn-sm" onclick="clearAll()">🗑 Clear All</button>
      <button class="btn-sm accent" onclick="downloadCSV()">⬇ Export CSV</button>
    </div>

    <div class="scan-list-wrap">
      <div id="scanListInv">
        <div class="empty-state" id="emptyStateInv">
          <div class="icon">📱</div>
          <p>Inventory is empty.<br/>Point camera at a record and scan.</p>
        </div>
      </div>
      <div id="scanListRev" style="display:none;">
        <div class="empty-state" id="emptyStateRev">
          <div class="icon">✅</div>
          <p>Review queue is clear.<br/>Unidentified records land here.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ==========================================
// 1. GLOBALS & STATE
// ==========================================
let API_KEY = '';
let DISCOGS_TOKEN = '';
let scanning = false;
let currentMode = 'ART'; 
let activeTab = 'INV'; 
let records = [];

// Auto Mode States: 0=Off, 3=3s, 5=5s
let autoState = 0; 
let autoScanTimer = null;
let countdownInterval = null;

let videoEl, canvasEl, ctxSnap, detectCanvas, detectCtx, detectRAF;
let pendingArtScan = null; 
let squareLockMs = null;   
let lastRect = null;       
const DETECT_STABLE_MS = 900; 

const GEMINI_MODEL = 'gemini-2.5-flash';
const CORS_PROXY  = 'https://corsproxy.io/?';

const PROMPT_ART = `You are an expert vinyl record identifier. Focus ENTIRELY on the visual album cover artwork, photography, illustrations, logos, or bold typography. Use your visual knowledge of album covers to identify the record. Ignore hands or fingers. Return ONLY valid JSON. Confidence should be 0.0 to 1.0. {"artist":"...","title":"...","catalog":"...","year":"...","rpm":"...","condition":"...","genre":"...","mode":"ART","confidence":0.0}`;
const PROMPT_TEXT = `You are an expert vinyl record identifier specializing in electronic music. You are looking at a CENTER LABEL or back sleeve. Extract text: CATALOG NUMBER (crucial), MATRIX / RUNOUT CODES, ARTIST, TITLE, LABEL, COUNTRY, YEAR, BARCODE, RPM. Read ALL text carefully. Ignore hands/fingers. Return ONLY valid JSON. {"artist":"...","title":"...","label":"...","catalog":"...","matrix":"...","barcode":"...","country":"...","tracks":["t1","t2"],"year":"...","rpm":"...","condition":"...","genre":"...","mode":"TEXT","confidence":0.0}`;

const PALETTE = ['#00e5d4', '#ff4d6d', '#f5c518', '#6e52ff', '#3b9eff', '#c462f5', '#f0c040', '#ff6ec7', '#f5832a', '#5ddb5d', '#a3e635', '#7b8cff', '#e8a87c'];
let knownGenres = {};
const discogsImageCache = new Map();
const discogsReleaseCache = new Map();

// ==========================================
// 2. UI & HELPERS
// ==========================================
function getGenreColor(genre) {
  if (!genre) genre = 'Other';
  if (!knownGenres[genre]) knownGenres[genre] = PALETTE[Object.keys(knownGenres).length % PALETTE.length];
  return knownGenres[genre];
}
function hexToRgba(hex, alpha) {
  let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeArtBtn').classList.toggle('active', mode === 'ART');
  document.getElementById('modeTextBtn').classList.toggle('active', mode === 'TEXT');
  updateCamLabel();
}
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabInvBtn').classList.toggle('active', tab === 'INV');
  document.getElementById('tabRevBtn').classList.toggle('active', tab === 'REV');
  document.getElementById('scanListInv').style.display = tab === 'INV' ? 'block' : 'none';
  document.getElementById('scanListRev').style.display = tab === 'REV' ? 'block' : 'none';
  document.getElementById('invControls').style.display = tab === 'INV' ? 'flex' : 'none';
}
function updateCamLabel(txt) {
  const lbl = document.getElementById('camLabel');
  if(txt) { lbl.textContent = txt; return; }
  lbl.textContent = currentMode === 'ART' ? 'Aim at cover art' : 'Aim at text/label';
}
function flashColor(color) {
  const flash = document.getElementById('genreFlash');
  flash.style.background = color;
  flash.classList.remove('show'); void flash.offsetWidth; flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 700);
}

// Auto Mode logic for mobile button
function cycleAutoMode() {
  const btn = document.getElementById('autoBtn');
  if (autoState === 0) { autoState = 3; btn.textContent = 'Auto: 3s'; btn.classList.add('active'); }
  else if (autoState === 3) { autoState = 5; btn.textContent = 'Auto: 5s'; btn.classList.add('active'); }
  else { autoState = 0; btn.textContent = 'Auto: OFF'; btn.classList.remove('active'); }
  
  if (autoState > 0 && scanning === false) runAutoScanLoop(autoState * 1000);
  else { clearTimeout(autoScanTimer); clearInterval(countdownInterval); updateCamLabel(); }
}

function toggleScan() {
  if (!scanning) doScan();
}

async function runAutoScanLoop(delay) {
  if (autoState === 0) return;
  if (!scanning && !document.getElementById('scanConfirm').classList.contains('show') && !document.getElementById('editionModal').classList.contains('show')) {
    await doScan();
  }
  if (autoState > 0) {
    let countdown = delay / 1000;
    updateCamLabel(`Next scan in ${countdown}s...`);
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      countdown--;
      if (countdown > 0 && autoState > 0) updateCamLabel(`Next scan in ${countdown}s...`);
      else clearInterval(countdownInterval);
    }, 1000);
    autoScanTimer = setTimeout(() => runAutoScanLoop(delay), delay);
  }
}

// ==========================================
// 3. CAMERA SETUP (Mobile Rear Cam)
// ==========================================
function startApp() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key || key.length < 10) return document.getElementById('setupErr').textContent = 'Please enter a valid Gemini API key.';
  API_KEY = key; DISCOGS_TOKEN = document.getElementById('discogsKeyInput').value.trim();
  localStorage.setItem('vinylshop_gemini_key', key);
  if (DISCOGS_TOKEN) localStorage.setItem('vinylshop_discogs_key', DISCOGS_TOKEN);
  document.getElementById('setupModal').classList.remove('show');
  document.getElementById('setupErr').textContent = '';
  startCamera();
}

(function() {
  const savedG = localStorage.getItem('vinylshop_gemini_key'); if (savedG) document.getElementById('apiKeyInput').value = savedG;
  const savedD = localStorage.getItem('vinylshop_discogs_key'); if (savedD) document.getElementById('discogsKeyInput').value = savedD;
  if(!savedG) document.getElementById('setupModal').classList.add('show');
  else startApp(); // Auto start if keys exist
})();

async function startCamera() {
  if (videoEl && videoEl.srcObject) return;
  videoEl = document.getElementById('video');
  canvasEl = document.getElementById('snapCanvas');
  ctxSnap = canvasEl.getContext('2d');
  detectCanvas = document.getElementById('detectCanvas');
  detectCtx = detectCanvas.getContext('2d');

  try {
    // Force Rear Camera on mobile, high res to ensure good OCR
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, 
      audio: false 
    });
    videoEl.srcObject = stream;
    videoEl.addEventListener('loadedmetadata', () => {
      videoEl.play();
      startSquareDetector();
    }, { once: true });
  } catch(e) { alert('Camera access required. ' + e.message); }
}

// ==========================================
// 4. IMAGE PROCESSING & API CALLS
// ==========================================
async function captureAndPreprocess() {
  const fw = videoEl.videoWidth, fh = videoEl.videoHeight;
  // Center square crop
  const side = Math.min(fw, fh) * 0.95; 
  const cx = (fw - side) / 2, cy = (fh - side) / 2;
  canvasEl.width = side; canvasEl.height = side;
  
  // NOTE: NO MIRRORING applied here. Phone rear cameras are correctly oriented.
  ctxSnap.drawImage(videoEl, cx, cy, side, side, 0, 0, side, side);
  
  // Contrast boost
  const out = document.createElement('canvas'); out.width = side; out.height = side;
  const oc = out.getContext('2d');
  oc.filter = 'contrast(1.2) brightness(1.05)';
  oc.drawImage(canvasEl, 0, 0);
  return out;
}

async function callGemini(b64, prompt) {
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${API_KEY}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: 'image/jpeg', data: b64 } }] }] })
  });
  if (!resp.ok) throw new Error(resp.status === 429 ? 'Rate Limit (Too Fast)' : `API Error ${resp.status}`);
  const json = await resp.json();
  let raw = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
  let data = {};
  try { data = JSON.parse(raw.replace(/```json|```/gi, '').trim()); } catch (_) { 
    const match = raw.match(/\{[\s\S]*\}/); if (match) data = JSON.parse(match[0]); 
  }
  return data;
}

// ==========================================
// 5. CORE SCAN PIPELINE
// ==========================================
async function doScan() {
  if (scanning || !videoEl || !videoEl.srcObject) return;
  stopSquareDetector();
  scanning = true;
  const btn = document.getElementById('scanBtn'), ring = document.getElementById('ring');
  btn.classList.add('scanning'); ring.classList.add('scanning'); 
  updateCamLabel('ANALYZING...');

  try {
    if (pendingArtScan) {
      updateCamLabel('READING TRACKLIST...');
      const processed = await captureAndPreprocess();
      const b64 = processed.toDataURL('image/jpeg', 0.88).split(',')[1];
      const textData = await callGemini(b64, PROMPT_TEXT);
      
      const merged = { ...pendingArtScan.artData, ...textData };
      merged.confidence = Math.max(parseFloat(pendingArtScan.artData.confidence||0), parseFloat(textData.confidence||0));
      const b64Full = pendingArtScan.b64Full; 
      pendingArtScan = null;
      updateCamLabel('SEARCHING DISCOGS...');
      await processAIResult(merged, b64Full, true);
    } 
    else if (currentMode === 'TEXT') {
      updateCamLabel('READING TEXT...');
      const processed = await captureAndPreprocess();
      const b64 = processed.toDataURL('image/jpeg', 0.88).split(',')[1];
      const textData = await callGemini(b64, PROMPT_TEXT);
      updateCamLabel('SEARCHING DISCOGS...');
      await processAIResult(textData, 'data:image/jpeg;base64,'+b64, true);
    } 
    else {
      updateCamLabel('ANALYZING COVER...');
      const processed = await captureAndPreprocess();
      const b64 = processed.toDataURL('image/jpeg', 0.88).split(',')[1];
      const b64Full = 'data:image/jpeg;base64,' + b64;
      const artData = await callGemini(b64, PROMPT_ART);
      const conf = parseFloat(artData.confidence || 0);

      if (conf < 0.70) {
        pendingArtScan = { artData, b64Full };
        ring.classList.remove('scanning'); ring.style.borderColor = 'var(--yellow)'; ring.style.borderStyle = 'solid';
        updateCamLabel('Flip record \u2014 Tap Scan to read back');
        scanning = false; btn.classList.remove('scanning');
        return; 
      }
      updateCamLabel('SEARCHING DISCOGS...');
      await processAIResult(artData, b64Full, false);
    }
  } catch (e) {
    pendingArtScan = null; alert(e.message);
  } finally {
    scanning = false; btn.classList.remove('scanning'); ring.classList.remove('scanning'); ring.style.borderColor = '';
    if (!pendingArtScan && autoState === 0) updateCamLabel();
    else if (!pendingArtScan && autoState > 0) startSquareDetector();
  }
}

async function processAIResult(data, b64Full, isTextMode) {
  const artist = data.artist || '', title = data.title || '', catalog = data.catalog || '', matrix = data.matrix || '';
  const tracks = data.tracks || [];
  const conf = parseFloat(data.confidence || 0);
  const id = 'V-' + crypto.randomUUID().substring(0, 6).toUpperCase();

  // Duplicate Check
  const norm = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g, '');
  const isDup = records.find(r => 
    (catalog && norm(catalog) === norm(r.catalog) && norm(catalog) !== 'unknown') ||
    (matrix && norm(matrix) === norm(r.matrix) && norm(matrix) !== 'unknown') ||
    (norm(artist) === norm(r.artist) && norm(title) === norm(r.title) && norm(artist))
  );

  if (isDup) { flashColor('var(--yellow)'); updateCamLabel('Duplicate Skipped'); setTimeout(updateCamLabel, 2000); startSquareDetector(); return; }

  let rec = { id, artist: artist||'Unknown', title: title||'Unknown', catalog, matrix, tracks, confidence: conf, status: 'REVIEW', rawImage: b64Full, timestamp: new Date().toISOString() };

  if (!artist && !title && !catalog && !matrix) {
    rec.title = 'Unreadable'; showScanConfirm(rec); return;
  }

  let discogsData = DISCOGS_TOKEN ? await discogsSearchFlow(artist, title, catalog, matrix, tracks, isTextMode) : null;
  
  if (discogsData && discogsData.found) {
    rec.artist = discogsData.artist || artist; rec.title = discogsData.title || title;
    rec.discogsUrl = discogsData.discogsUrl; rec.discogsId = discogsData.releaseId;
    rec.discogsLowest = discogsData.lowestPrice; rec.discogsMedian = discogsData.medianPrice;
    rec.editionYear = discogsData.year; rec.editionCountry = discogsData.country;
    rec.thumb = discogsData.thumb; rec.genre = discogsData.discogsGenre || data.genre || 'Electronic';
    rec.price = discogsData.medianPrice ? parseFloat(discogsData.medianPrice).toFixed(2) : (discogsData.lowestPrice ? parseFloat(discogsData.lowestPrice).toFixed(2) : '0.00');
    rec.status = 'PRICED';
  }

  showScanConfirm(rec);
}

// ==========================================
// 6. MODALS & DISCOGS
// ==========================================
function showScanConfirm(r) {
  const m = document.getElementById('scanConfirm');
  document.getElementById('scThumb').src = r.thumb || r.rawImage || '';
  document.getElementById('scTitle').textContent = `${r.artist} - ${r.title}`;
  document.getElementById('scMeta').textContent = [r.catalog, r.matrix, r.price ? '$'+r.price : ''].filter(Boolean).join(' \u2022 ');
  document.getElementById('scYear').value = r.editionYear || '';
  document.getElementById('scCountry').value = r.editionCountry || '';
  
  const bdg = document.getElementById('scBadges'); bdg.innerHTML = '';
  if (r.confidence) bdg.innerHTML += `<span class="badge" style="border-color:var(--accent); color:var(--accent);">${Math.round(r.confidence*100)}% Match</span>`;
  if (r.status === 'REVIEW') bdg.innerHTML += `<span class="badge" style="border-color:var(--yellow); color:var(--yellow);">Needs Review</span>`;
  if (r.genre) bdg.innerHTML += `<span class="badge">${r.genre}</span>`;

  m.classList.add('show');
  
  document.getElementById('scAddBtn').onclick = () => {
    r.editionYear = document.getElementById('scYear').value;
    r.editionCountry = document.getElementById('scCountry').value;
    records.push(r); m.classList.remove('show'); 
    if(r.status==='PRICED') flashColor(getGenreColor(r.genre));
    renderLists(); startSquareDetector();
  };
  document.getElementById('scRetryBtn').onclick = () => { m.classList.remove('show'); startSquareDetector(); };
  document.getElementById('scCancelBtn').onclick = () => { m.classList.remove('show'); startSquareDetector(); };
}

async function discogsSearchFlow(artist, title, catalog, matrix, tracks, isTextMode, rawQuery = null) {
  try {
    let q = rawQuery ? encodeURIComponent(rawQuery) : encodeURIComponent([catalog, matrix, artist, title].filter(Boolean).join(' '));
    const url = `https://api.discogs.com/database/search?q=${q}&type=release&format=vinyl&per_page=6&token=${DISCOGS_TOKEN}`;
    const resp = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!resp.ok) return null;
    const res = (await resp.json()).results || [];
    const vinyls = res.filter(r => r.format && r.format.some(f => f.toLowerCase().includes('vinyl')));
    if (!vinyls.length) return null;

    let rel = vinyls[0];
    if (vinyls.length > 1 && !rawQuery) {
      clearTimeout(autoScanTimer); // Pause auto scan during modal
      rel = await askUserForEdition(vinyls);
    }

    const stResp = await fetch(CORS_PROXY + encodeURIComponent(`https://api.discogs.com/marketplace/stats/${rel.id}?curr_abbr=USD&token=${DISCOGS_TOKEN}`));
    const stData = stResp.ok ? await stResp.json() : {};
    const psResp = await fetch(CORS_PROXY + encodeURIComponent(`https://api.discogs.com/marketplace/price_suggestions/${rel.id}?token=${DISCOGS_TOKEN}`));
    const psData = psResp.ok ? await psResp.json() : {};
    const median = psData['Very Good Plus (VG+)']?.value || null;

    let fArt = artist, fTit = title;
    if (rel.title && rel.title.includes(' - ')) { fArt = rel.title.split(' - ')[0]; fTit = rel.title.split(' - ').slice(1).join(' - '); }

    return {
      found: true, releaseId: rel.id, thumb: rel.cover_image || rel.thumb || '', discogsUrl: `https://www.discogs.com${rel.uri || '/release/'+rel.id}`,
      lowestPrice: stData.lowest_price?.value?.toFixed(2)||'', medianPrice: median?.toFixed(2)||'', numForSale: stData.num_for_sale||0,
      year: rel.year||'', country: rel.country||'', discogsGenre: rel.style?.[0] || rel.genre?.[0], artist: fArt, title: fTit
    };
  } catch(e) { return null; }
}

function askUserForEdition(releases) {
  return new Promise(resolve => {
    const m = document.getElementById('editionModal');
    const lst = document.getElementById('editionList');
    lst.innerHTML = '';
    releases.forEach(r => {
      const b = document.createElement('div'); b.className = 'edition-btn';
      b.innerHTML = `<img src="${r.cover_image||r.thumb||''}"><div class="edition-info"><strong>${r.year||'?'} \u2022 ${r.country||'?'}</strong><span class="title">${r.title}</span><span>${(r.label||[])[0]||''}</span></div>`;
      b.onclick = () => { m.classList.remove('show'); resolve(r); };
      lst.appendChild(b);
    });
    document.getElementById('editionSkipBtn').onclick = () => { m.classList.remove('show'); resolve(releases[0]); };
    m.classList.add('show');
  });
}

// ==========================================
// 7. LIST RENDERING & DATA MANAGEMENT
// ==========================================
function renderLists() {
  const inv = document.getElementById('scanListInv'), rev = document.getElementById('scanListRev');
  Array.from(inv.children).forEach(c => { if(c.id!=='emptyStateInv') c.remove(); });
  Array.from(rev.children).forEach(c => { if(c.id!=='emptyStateRev') c.remove(); });
  let ic=0, rc=0;

  records.slice().reverse().forEach(r => {
    const el = document.createElement('div'); el.className = 'scan-item'; el.id = 'scan-'+r.id;
    if (r.status === 'REVIEW') {
      rc++;
      const sq = encodeURIComponent([r.artist!=='Unknown'?r.artist:'', r.title!=='Unreadable'?r.title:'', r.catalog, r.matrix].filter(Boolean).join(' '));
      el.innerHTML = `
        <div class="bar" style="background:var(--yellow)"></div>
        <img src="${r.rawImage||''}">
        <div class="scan-info">
          <div class="scan-artist" style="color:var(--yellow)">Review Required</div>
          <div class="scan-title">${r.artist} - ${r.title}</div>
          <div class="action-row">
            <a href="https://www.ebay.com/sch/i.html?_nkw=${sq}+vinyl" target="_blank" class="action-btn">eBay\u2197</a>
            <a href="https://www.google.com/search?q=${sq}+vinyl" target="_blank" class="action-btn">Google\u2197</a>
            <button class="action-btn" style="color:var(--accent);border-color:var(--accent);" onclick="editRecord('${r.id}')">\u270f\ufe0f Retry</button>
            <button class="action-btn" onclick="manualResolve('${r.id}')">\ud83d\udcdd Manual</button>
          </div>
        </div>
        <div class="scan-right"><button class="icon-btn del" onclick="deleteRecord('${r.id}')">\u2715</button></div>
      `;
      rev.appendChild(el);
    } else {
      ic++;
      const c = getGenreColor(r.genre);
      el.innerHTML = `
        <div class="bar" style="background:${c}"></div>
        <img src="${r.thumb||r.rawImage||''}">
        <div class="scan-info">
          <div class="scan-artist">${r.artist}</div>
          <div class="scan-title">${r.title} ${r.catalog?'['+r.catalog+']':''}</div>
          <div class="scan-badges">
            <span class="badge" style="color:${c}; border-color:${c};">${r.genre}</span>
            ${r.editionYear ? `<span class="badge">${r.editionYear} ${r.editionCountry||''}</span>` : ''}
            ${r.discogsUrl ? `<a href="${r.discogsUrl}" target="_blank" class="badge" style="text-decoration:none;">Discogs\u2197</a>` : ''}
          </div>
        </div>
        <div class="scan-right">
          <div class="icon-btn-group"><button class="icon-btn" onclick="editRecord('${r.id}')">\u270f\ufe0f</button><button class="icon-btn del" onclick="deleteRecord('${r.id}')">\u2715</button></div>
          <div class="scan-price" style="color:var(--accent);">$${r.price}</div>
        </div>
      `;
      inv.appendChild(el);
    }
  });
  
  document.getElementById('countInv').textContent = ic; document.getElementById('countRev').textContent = rc;
  document.getElementById('emptyStateInv').style.display = ic===0 ? 'flex' : 'none';
  document.getElementById('emptyStateRev').style.display = rc===0 ? 'flex' : 'none';
  
  const val = records.filter(r=>r.status!=='REVIEW').reduce((s,r)=>s+parseFloat(r.price||0),0);
  document.getElementById('scanCount').textContent = ic; document.getElementById('totalValue').textContent = val.toFixed(2);
}

async function editRecord(id) {
  const r = records.find(x => x.id === id); if(!r) return;
  const def = [r.artist!=='Unknown'?r.artist:'', r.title!=='Unreadable'?r.title:''].filter(Boolean).join(' - ');
  const q = prompt("Edit Record\nFormat: Artist - Title", def);
  if(!q) return;
  
  const dData = await discogsSearchFlow(null,null,null,null,null,r.condition,false,q);
  if(dData && dData.found) {
    r.artist = dData.artist; r.title = dData.title; r.discogsUrl = dData.discogsUrl;
    r.price = dData.medianPrice || dData.lowestPrice || "0.00"; r.thumb = dData.thumb;
    r.editionYear = dData.year; r.editionCountry = dData.country; r.genre = dData.discogsGenre || r.genre;
    r.status = 'PRICED';
  } else { r.artist = q.split('-')[0]||q; r.title = q.split('-')[1]||''; }
  renderLists();
}

function manualResolve(id) {
  const r = records.find(x => x.id === id); if(!r) return;
  const def = [r.artist!=='Unknown'?r.artist:'', r.title!=='Unreadable'?r.title:''].filter(Boolean).join(' - ');
  const q = prompt("Manual Add\nFormat: Artist - Title | Price", def + " | 5.00");
  if(!q) return;
  const p = q.split('|');
  r.artist = p[0].split('-')[0]?.trim()||p[0]; r.title = p[0].split('-')[1]?.trim()||'';
  r.price = p[1] ? parseFloat(p[1]).toFixed(2) : "5.00"; r.status = 'MANUAL';
  renderLists();
}

function deleteRecord(id) { records.splice(records.findIndex(r=>r.id===id), 1); renderLists(); }
function clearAll() { if(confirm('Clear all items?')) { records.length=0; renderLists(); } }

function downloadCSV() {
  const uniq = records.filter(r => r.status!=='REVIEW'); if(!uniq.length) return;
  const rows = [['ID','Artist','Title','Catalog','Matrix','Genre','Year','Country','Price']];
  uniq.forEach(r => rows.push([r.id, `"${r.artist}"`, `"${r.title}"`, `"${r.catalog}"`, `"${r.matrix}"`, `"${r.genre}"`, r.editionYear, r.editionCountry, r.price]));
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([rows.map(e=>e.join(',')).join('\n')], {type:'text/csv'}));
  a.download = `vinylshop_${new Date().toISOString().split('T')[0]}.csv`; a.click();
}

// ==========================================
// 8. BACKGROUND SQUARE DETECTOR 
// ==========================================
const sW=80, sH=60;
const sC = document.createElement('canvas'); sC.width=sW; sC.height=sH;
const sCtx = sC.getContext('2d', {willReadFrequently:true});

function startSquareDetector() {
  if (detectRAF || !videoEl || !videoEl.srcObject) return;
  detectRAF = requestAnimationFrame(detectLoop);
}
function stopSquareDetector() {
  if (detectRAF) cancelAnimationFrame(detectRAF); detectRAF=null; squareLockMs=null;
  if(detectCtx) detectCtx.clearRect(0,0,detectCanvas.width,detectCanvas.height);
}

function detectLoop() {
  if (!scanning && autoState > 0) runDetect();
  detectRAF = requestAnimationFrame(detectLoop);
}

function runDetect() {
  if (videoEl.readyState < 2) return;
  const dw = detectCanvas.offsetWidth, dh = detectCanvas.offsetHeight;
  if (detectCanvas.width !== dw || detectCanvas.height !== dh) { detectCanvas.width = dw; detectCanvas.height = dh; }
  
  sCtx.drawImage(videoEl, 0, 0, sW, sH);
  const px = sCtx.getImageData(0,0,sW,sH).data;
  const edge = new Uint8Array(sW*sH);
  
  for (let y=1; y<sH-1; y++) for(let x=1; x<sW-1; x++) {
    const i = (y*sW+x)*4;
    const g = (px[i]*77 + px[i+1]*150 + px[i+2]*29) >> 8;
    edge[y*sW+x] = g; 
  }
  
  const rs = new Float32Array(sH), cs = new Float32Array(sW);
  for(let y=0;y<sH;y++) for(let x=0;x<sW;x++) { rs[y]+=edge[y*sW+x]; cs[x]+=edge[y*sW+x]; }
  
  let top=-1, bot=-1, lft=-1, rgt=-1;
  const rt=Math.max(...rs)*0.4, ct=Math.max(...cs)*0.4;
  for(let i=2;i<sH-2;i++) if(rs[i]>rt) { if(top<0) top=i; bot=i; }
  for(let i=2;i<sW-2;i++) if(cs[i]>ct) { if(lft<0) lft=i; rgt=i; }
  
  if (top<0 || lft<0 || (bot-top)/sH < 0.2 || (rgt-lft)/sW < 0.2) { squareLockMs=null; drawBrackets(null,dw,dh,0); return; }
  
  const now = performance.now();
  if(!squareLockMs) squareLockMs = now;
  const prog = Math.min(1, (now-squareLockMs)/DETECT_STABLE_MS);
  
  drawBrackets({x:lft/sW, y:top/sH, w:(rgt-lft)/sW, h:(bot-top)/sH}, dw, dh, prog);
  
  if (prog >= 1 && !scanning) { squareLockMs=null; stopSquareDetector(); doScan(); }
}

function drawBrackets(r, dw, dh, p) {
  detectCtx.clearRect(0,0,dw,dh); if(!r) return;
  const sw=dw, sh=dh, px=r.x*sw, py=r.y*sh, pw=r.w*sw, ph=r.h*sh;
  detectCtx.strokeStyle = `rgba(245, 197, 24, ${0.4 + p*0.6})`;
  detectCtx.lineWidth = 3; detectCtx.lineCap = 'round';
  const len = Math.min(pw,ph)*0.2;
  [[px,py,1,1],[px+pw,py,-1,1],[px,py+ph,1,-1],[px+pw,py+ph,-1,-1]].forEach(([x,y,dx,dy])=>{
    detectCtx.beginPath(); detectCtx.moveTo(x+dx*len,y); detectCtx.lineTo(x,y); detectCtx.lineTo(x,y+dy*len); detectCtx.stroke();
  });
}
