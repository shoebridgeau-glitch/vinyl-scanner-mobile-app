<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>VinylShop — Mobile Text Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #07070a; --panel: #0f0f13; --card: #16161b; --border: #222229;
    --text: #e2e2ea; --muted: #55555f; --muted2: #3a3a44;
    --accent: #00e5d4; --accent2: #6e52ff; --red: #ff4d6d; --yellow: #f5c518;
  }
  
  html, body { height: 100dvh; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; display: flex; flex-direction: column; }

  /* ── Top Bar ── */
  .topbar { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; z-index: 20; }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 12px; }
  .topbar h1 { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
  .topbar h1 span { color: var(--accent); }
  .topbar-stats { display: flex; gap: 8px; align-items: center; }
  .stat-pill { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-family: 'JetBrains Mono', monospace; font-size: 11px; }
  .stat-pill b { color: var(--accent); }
  .settings-btn { background: transparent; border: none; color: var(--muted); font-size: 18px; cursor: pointer; padding: 4px; }

  /* ── Main Layout: Stacked for Mobile ── */
  .main-mobile { display: flex; flex-direction: column; flex: 1; overflow: hidden; min-height: 0; }

  /* ── Camera Area (Top Half) ── */
  .cam-area { position: relative; height: 42dvh; min-height: 250px; background: #000; flex-shrink: 0; overflow: hidden; }
  video { width: 100%; height: 100%; object-fit: cover; background: #000; }
  .cam-overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 16px; pointer-events: none; }
  
  .cam-label { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--accent); font-weight: 700; background: rgba(0, 0, 0, 0.65); padding: 8px 16px; border-radius: 20px; backdrop-filter: blur(4px); transition: color 0.2s; text-align: center;}
  .cam-label.scanning { color: var(--red); animation: pulse 1s infinite; }
  
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }
  
  .genre-flash { position: absolute; inset: 0; opacity: 0; pointer-events: none; transition: opacity .05s; }
  .genre-flash.show { animation: flashIn .6s ease-out forwards; }
  @keyframes flashIn { 0% { opacity: .3 } 100% { opacity: 0 } }

  /* ── Thumb Controls Bar ── */
  .controls-bar { display: flex; align-items: center; justify-content: space-around; padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; }
  
  .scan-btn-wrap { position: relative; }
  .scan-btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--accent); background: rgba(0, 229, 212, .1); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 26px; color: var(--accent); transition: transform 0.1s; }
  .scan-btn:active { transform: scale(0.9); }
  .scan-btn.scanning { border-color: var(--red); background: rgba(255, 77, 109, .15); pointer-events: none; }
  .scan-btn.auto-active { border-color: var(--yellow); background: rgba(245, 197, 24, .15); color: var(--yellow); }

  .auto-toggle { display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .auto-btn { background: var(--card); border: 1px solid var(--border); color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 11px; padding: 8px 12px; border-radius: 8px; cursor: pointer; width: 90px; text-align: center; }
  .auto-btn.active { background: rgba(245, 197, 24, 0.1); color: var(--yellow); border-color: var(--yellow); }

  /* ── Bottom List Area ── */
  .list-area { flex: 1; display: flex; flex-direction: column; background: var(--bg); overflow: hidden; min-height: 0; }
  .sidebar-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--panel); flex-shrink: 0; }
  .tab-btn { flex: 1; padding: 14px 10px; background: transparent; border: none; color: var(--muted); font-family: 'JetBrains Mono', monospace; font-size: 12px; cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 700; background: var(--card); }

  .list-actions { display: flex; justify-content: space-between; padding: 10px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .btn-sm { padding: 8px 14px; border-radius: 6px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 12px; font-weight: 600; }
  .btn-sm.accent { background: var(--accent); color: #000; border-color: var(--accent); }

  .scan-list-wrap { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: max(20px, env(safe-area-inset-bottom)); }
  
  .scan-item { display: flex; gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--border); position: relative; background: var(--card); }
  .scan-item .bar { width: 4px; border-radius: 2px; flex-shrink: 0; align-self: stretch; }
  .scan-item img { width: 55px; height: 55px; object-fit: cover; border-radius: 6px; background: #000; border: 1px solid rgba(255,255,255,0.1); }
  
  .scan-info { flex: 1; display: flex; flex-direction: column; gap: 4px; overflow: hidden; }
  .scan-artist { font-weight: 700; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scan-title { font-size: 13px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .scan-badges { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .badge { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 4px 8px; border-radius: 4px; background: var(--panel); border: 1px solid var(--border); color: var(--text); }
  
  .scan-right { display: flex; flex-direction: column; align-items: flex-end; justify-content: space-between; flex-shrink: 0; min-width: 65px; }
  .scan-price { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 700; color: var(--accent); text-align: right; }
  .icon-btn-group { display: flex; gap: 14px; }
  .icon-btn { background: transparent; border: none; color: var(--muted); font-size: 18px; padding: 4px; cursor: pointer; }

  .action-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .action-btn { font-family: 'JetBrains Mono', monospace; font-size: 11px; text-decoration: none; padding: 6px 12px; border-radius: 6px; border: 1px solid var(--border); color: var(--text); background: var(--panel); cursor: pointer;}
  
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--muted); text-align: center; padding: 30px 20px; }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty-state p { font-size: 13px; line-height: 1.6; font-family: 'JetBrains Mono', monospace; }

  /* ── Status bar ── */
  .status-bar { background: var(--panel); border-top: 1px solid var(--border); padding: 8px 16px; font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono', monospace; flex-shrink: 0; display: flex; align-items: center; gap: 10px; z-index: 20; padding-bottom: max(8px, env(safe-area-inset-bottom)); }
  .status-bar .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .status-bar .dot.red { background: var(--red); }
  .status-bar .dot.yellow { background: var(--yellow); }
  .status-bar .msg { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* ── Modals ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); padding: 16px; }
  .modal-overlay.show { display: flex; }
  .modal-card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 24px; width: 100%; max-width: 400px; max-height: 85dvh; display: flex; flex-direction: column; overflow-y: auto; }
  
  .edition-scroll { display: flex; flex-direction: column; gap: 10px; margin: 16px 0; }
  .edition-btn { display: flex; align-items: flex-start; gap: 12px; text-align: left; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
  .edition-btn img { width: 65px; height: 65px; border-radius: 6px; object-fit: cover; background: #000; border: 1px solid rgba(255,255,255,0.1); }
  .edition-info { display: flex; flex-direction: column; flex: 1; }
  .edition-info strong { color: var(--accent); font-size: 14px; }
  .edition-info span.title { font-size: 12px; color: var(--text); margin-top: 2px; }
  .edition-info span.details { font-size: 11px; color: var(--muted); margin-top: 4px; }

  .modal-card input { width: 100%; padding: 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--card); color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px; }
  .modal-card .btn-primary { width: 100%; padding: 16px; border-radius: 8px; border: none; background: var(--accent); color: #000; font-size: 16px; font-weight: 700; cursor: pointer; }

  .sc-edits { display: flex; gap: 12px; margin: 16px 0; }
  .sc-field { flex: 1; }
  .sc-field label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 1px;}
  .sc-field input { margin-bottom: 0; padding: 12px; }
  .sc-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .sc-actions .full { grid-column: 1 / -1; }
  
  .tracklist-preview { font-size: 10px; color: var(--muted); margin-top: 8px; line-height: 1.4; text-align: left; max-height: 60px; overflow-y: hidden; text-overflow: ellipsis;}
</style>
</head>
<body>

<div class="modal-overlay" id="setupModal">
  <div class="modal-card">
    <h2 style="margin-bottom:16px;text-align:center;">API Settings</h2>
    <label style="font-size:12px;color:var(--muted);margin-bottom:6px;">GEMINI API KEY</label>
    <input id="apiKeyInput" type="password" placeholder="AIza..." autocomplete="off"/>
    
    <label style="font-size:12px;color:var(--muted);margin-bottom:6px;">DISCOGS TOKEN</label>
    <input id="discogsKeyInput" type="password" placeholder="For accurate pricing" autocomplete="off"/>

    <label style="font-size:12px;color:var(--muted);margin-bottom:6px;">GOOGLE SHEETS URL (Auto-Sync)</label>
    <input id="sheetsUrlInput" type="url" placeholder="https://script.google.com/.../exec" autocomplete="off"/>
    
    <button class="btn-primary" onclick="saveSettings()">Save & Start Scanner</button>
    <div id="setupErr" style="color:var(--red); font-size:13px; margin-top:12px; text-align:center;"></div>
  </div>
</div>

<div class="modal-overlay" id="editionModal">
  <div class="modal-card">
    <h3 style="font-size:18px;">Select Exact Pressing</h3>
    <p style="font-size:13px; color:var(--muted); margin-top:4px;">Review the tracklists below.</p>
    <div class="edition-scroll" id="editionList"></div>
    <button class="btn-primary" style="background:var(--panel); color:var(--text); border:1px solid var(--border);" id="editionSkipBtn">Skip & Auto-Pick</button>
  </div>
</div>

<div class="modal-overlay" id="scanConfirm">
  <div class="modal-card">
    <div style="display:flex; gap:16px; margin-bottom:16px;">
      <img id="scThumb" src="" style="width:85px; height:85px; border-radius:8px; object-fit:cover; background:#000; border:1px solid var(--border);">
      <div style="display:flex; flex-direction:column; justify-content:center;">
        <strong id="scTitle" style="font-size:18px; line-height:1.3;">Artist - Title</strong>
        <span id="scMeta" style="font-size:13px; color:var(--muted); margin-top:6px;"></span>
      </div>
    </div>
    <div id="scBadges" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;"></div>
    
    <div class="tracklist-preview" id="scTracks" style="max-height:80px; overflow-y:auto; border:1px solid var(--border); padding:8px; border-radius:6px; background:var(--bg);"></div>

    <div class="sc-edits">
      <div class="sc-field"><label>Year</label><input id="scYear" type="number" placeholder="YYYY"></div>
      <div class="sc-field"><label>Country</label><input id="scCountry" type="text" placeholder="UK/US"></div>
    </div>

    <div class="sc-actions">
      <button class="btn-primary full" id="scAddBtn">✓ Add to Inventory</button>
      <button class="btn-primary" style="background:var(--panel); color:var(--text); border:1px solid var(--border);" id="scRetryBtn">🔄 Retry</button>
      <button class="btn-primary" style="background:transparent; color:var(--red); border:1px solid var(--red);" id="scCancelBtn">✕ Discard</button>
    </div>
  </div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">🎵</div>
    <h1>Vinyl<span>Shop</span></h1>
  </div>
  <div class="topbar-stats">
    <div class="stat-pill"><b id="scanCount">0</b> items</div>
    <div class="stat-pill">$<b id="totalValue">0.00</b></div>
    <button class="settings-btn" onclick="openSettings()" title="Settings">⚙️</button>
  </div>
</div>

<div class="main-mobile">
  <div class="cam-area">
    <video id="video" autoplay muted playsinline></video>
    <div class="cam-overlay">
      <div class="cam-label" id="camLabel">Aim at text, label or tracklist</div>
    </div>
    <div class="genre-flash" id="genreFlash"></div>
    <canvas id="snapCanvas" style="display:none"></canvas>
  </div>

  <div class="controls-bar">
    <div style="width: 90px;"></div> 
    <div class="scan-btn-wrap">
      <button class="scan-btn" id="scanBtn" onclick="toggleScan()">⏺</button>
    </div>
    <div class="auto-toggle">
      <button id="autoBtn" class="auto-btn" onclick="cycleAutoMode()">Auto: OFF</button>
    </div>
  </div>

  <div class="list-area">
    <div class="sidebar-tabs">
      <button class="tab-btn active" id="tabInvBtn" onclick="switchTab('INV')">Inventory (<span id="countInv">0</span>)</button>
      <button class="tab-btn" id="tabRevBtn" onclick="switchTab('REV')" style="color:var(--yellow)">Review (<span id="countRev">0</span>)</button>
    </div>
    
    <div class="list-actions" id="invControls">
      <button class="btn-sm" onclick="clearAll()">🗑 Clear All</button>
      <button class="btn-sm accent" onclick="downloadCSV()">⬇ Export CSV</button>
    </div>

    <div class="scan-list-wrap">
      <div id="scanListInv">
        <div class="empty-state" id="emptyStateInv">
          <div class="icon">📱</div>
          <p>Inventory is empty.<br/>Point camera at a record and snap.</p>
        </div>
      </div>
      <div id="scanListRev" style="display:none;">
        <div class="empty-state" id="emptyStateRev">
          <div class="icon">✅</div>
          <p>Review queue is clear.<br/>Unidentified records land here.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="status-bar">
  <div class="dot" id="statusDot"></div>
  <div class="msg" id="statusMsg">Ready</div>
</div>

<script>
// ==========================================
// 1. GLOBALS & STATE
// ==========================================
let API_KEY = '';
let DISCOGS_TOKEN = '';
let SHEETS_URL = '';
let scanning = false;
let activeTab = 'INV'; 
let records = [];

let autoState = 0; 
let autoScanTimer = null;
let countdownInterval = null;

let videoEl, canvasEl, ctxSnap;

const GEMINI_MODEL = 'gemini-2.5-flash';
const CORS_PROXY  = 'https://corsproxy.io/?';

// Text-focused prompt
const PROMPT = `You are an expert vinyl record identifier specializing in electronic music. You are looking at a CENTER LABEL or back sleeve. Extract text: CATALOG NUMBER (crucial), MATRIX / RUNOUT CODES, ARTIST, TITLE, LABEL, COUNTRY, YEAR, BARCODE, RPM. Read ALL text carefully. Ignore hands/fingers. Return ONLY valid JSON. {"artist":"...","title":"...","label":"...","catalog":"...","matrix":"...","barcode":"...","country":"...","tracks":["t1","t2"],"year":"...","rpm":"...","genre":"...","confidence":0.0}`;

const PALETTE = ['#00e5d4', '#ff4d6d', '#f5c518', '#6e52ff', '#3b9eff', '#c462f5', '#f0c040', '#ff6ec7', '#f5832a', '#5ddb5d', '#a3e635', '#7b8cff', '#e8a87c'];
let knownGenres = {};

// ==========================================
// 2. LOCAL STORAGE & GOOGLE SHEETS
// ==========================================
function saveLocalRecords() {
  try {
    localStorage.setItem('vinylshop_records', JSON.stringify(records));
  } catch(e) { console.warn("Storage limit reached"); }
}

function loadLocalRecords() {
  const saved = localStorage.getItem('vinylshop_records');
  if (saved) {
    records = JSON.parse(saved);
    renderLists();
    updateStats();
  }
}

function syncToGoogleSheets(rec) {
  if (!SHEETS_URL) return;
  // Format the tracklist array into a clean string with HTML line breaks for E-commerce product descriptions
  const formattedTracks = (rec.tracks && rec.tracks.length > 0) ? rec.tracks.join('<br>') : "";
  
  const payload = {
    id: rec.id,
    artist: rec.artist,
    title: rec.title,
    catalog: rec.catalog || rec.matrix || "", // Use as E-Commerce SKU
    matrix: rec.matrix,
    genre: rec.genre, // Multiple genres comma separated for E-Commerce Tags
    tracks: formattedTracks, // Body HTML
    image_url: rec.thumb || "", // Image Src
    year: rec.editionYear,
    country: rec.editionCountry,
    price: rec.price
  };

  fetch(SHEETS_URL, {
    method: 'POST',
    mode: 'no-cors', 
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  }).catch(e => console.error("Sheet sync failed", e));
}

// ==========================================
// 3. UI & HELPERS
// ==========================================
function getGenreColor(genre) {
  const primeGenre = (genre || 'Other').split(',')[0].trim();
  if (!knownGenres[primeGenre]) knownGenres[primeGenre] = PALETTE[Object.keys(knownGenres).length % PALETTE.length];
  return knownGenres[primeGenre];
}
function hexToRgba(hex, alpha) {
  let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
function switchTab(tab) {
  activeTab = tab;
  document.getElementById('tabInvBtn').classList.toggle('active', tab === 'INV');
  document.getElementById('tabRevBtn').classList.toggle('active', tab === 'REV');
  document.getElementById('scanListInv').style.display = tab === 'INV' ? 'block' : 'none';
  document.getElementById('scanListRev').style.display = tab === 'REV' ? 'block' : 'none';
  document.getElementById('invControls').style.display = tab === 'INV' ? 'flex' : 'none';
}
function updateCamLabel(txt) {
  const lbl = document.getElementById('camLabel');
  if(txt) { lbl.textContent = txt; return; }
  lbl.textContent = 'Aim at text, label or tracklist';
}
function flashColor(color) {
  const flash = document.getElementById('genreFlash');
  flash.style.background = color;
  flash.classList.remove('show'); void flash.offsetWidth; flash.classList.add('show');
  setTimeout(() => flash.classList.remove('show'), 700);
}

function cycleAutoMode() {
  const btn = document.getElementById('autoBtn');
  if (autoState === 0) { autoState = 6; btn.textContent = 'Auto: 6s'; btn.classList.add('active'); }
  else if (autoState === 6) { autoState = 9; btn.textContent = 'Auto: 9s'; btn.classList.add('active'); }
  else { autoState = 0; btn.textContent = 'Auto: OFF'; btn.classList.remove('active'); }
  
  if (autoState > 0 && scanning === false) runAutoScanLoop(autoState * 1000);
  else { clearTimeout(autoScanTimer); clearInterval(countdownInterval); updateCamLabel(); }
}

function toggleScan() {
  if (!scanning) doScan();
}

async function runAutoScanLoop(delay) {
  if (autoState === 0) return;
  if (!scanning && !document.getElementById('scanConfirm').classList.contains('show') && !document.getElementById('editionModal').classList.contains('show')) {
    await doScan();
  }
  if (autoState > 0) {
    let countdown = delay / 1000;
    updateCamLabel(`Next scan in ${countdown}s...`);
    clearInterval(countdownInterval);
    countdownInterval = setInterval(() => {
      countdown--;
      if (countdown > 0 && autoState > 0) updateCamLabel(`Next scan in ${countdown}s...`);
      else clearInterval(countdownInterval);
    }, 1000);
    autoScanTimer = setTimeout(() => runAutoScanLoop(delay), delay);
  }
}

// ==========================================
// 4. SETTINGS & CAMERA INITIALIZATION
// ==========================================
function saveSettings() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key || key.length < 10) return document.getElementById('setupErr').textContent = 'Please enter a valid Gemini API key.';
  
  API_KEY = key; 
  DISCOGS_TOKEN = document.getElementById('discogsKeyInput').value.trim();
  SHEETS_URL = document.getElementById('sheetsUrlInput').value.trim();
  
  localStorage.setItem('vinylshop_gemini_key', key);
  if (DISCOGS_TOKEN) localStorage.setItem('vinylshop_discogs_key', DISCOGS_TOKEN);
  if (SHEETS_URL) localStorage.setItem('vinylshop_sheets_url', SHEETS_URL);
  
  document.getElementById('setupModal').classList.remove('show');
  document.getElementById('setupErr').textContent = '';
  startCamera();
}

function openSettings() { 
  document.getElementById('setupModal').classList.add('show'); 
}

(function init() {
  const savedG = localStorage.getItem('vinylshop_gemini_key'); 
  const savedD = localStorage.getItem('vinylshop_discogs_key'); 
  const savedS = localStorage.getItem('vinylshop_sheets_url'); 
  
  if (savedG) document.getElementById('apiKeyInput').value = savedG;
  if (savedD) document.getElementById('discogsKeyInput').value = savedD;
  if (savedS) document.getElementById('sheetsUrlInput').value = savedS;
  
  loadLocalRecords();
  
  if(!savedG) document.getElementById('setupModal').classList.add('show');
  else saveSettings(); // Auto start
})();

async function startCamera() {
  if (videoEl && videoEl.srcObject) return;
  videoEl = document.getElementById('video');
  canvasEl = document.getElementById('snapCanvas');
  ctxSnap = canvasEl.getContext('2d');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ 
      video: { facingMode: 'environment', width: { ideal: 1920 }, height: { ideal: 1080 } }, 
      audio: false 
    });
    videoEl.srcObject = stream;
    videoEl.addEventListener('loadedmetadata', () => { videoEl.play(); }, { once: true });
  } catch(e) { alert('Camera access required. ' + e.message); }
}

// ==========================================
// 5. IMAGE PROCESSING & API CALLS
// ==========================================
async function captureAndPreprocess() {
  const fw = videoEl.videoWidth, fh = videoEl.videoHeight;
  canvasEl.width = fw; canvasEl.height = fh;
  ctxSnap.drawImage(videoEl, 0, 0, fw, fh);
  const out = document.createElement('canvas'); out.width = fw; out.height = fh;
  const oc = out.getContext('2d');
  oc.filter = 'contrast(1.15) brightness(1.05)';
  oc.drawImage(canvasEl, 0, 0);
  return out;
}

async function callGemini(b64, prompt, retries = 2) {
  const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${API_KEY}`, {
    method: 'POST', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inlineData: { mimeType: 'image/jpeg', data: b64 } }] }] })
  });
  
  if (resp.status === 429) {
    if (retries > 0) {
      setStatus('API cooling down... pausing 5s', true);
      await new Promise(r => setTimeout(r, 5000));
      return callGemini(b64, prompt, retries - 1);
    } else {
      throw new Error('Rate Limit (Too Fast) - Please wait 60s');
    }
  }
  if (!resp.ok) throw new Error(`API Error ${resp.status}`);
  
  const json = await resp.json();
  let raw = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
  let data = {};
  try { data = JSON.parse(raw.replace(/```json|```/gi, '').trim()); } catch (_) { 
    const match = raw.match(/\{[\s\S]*\}/); if (match) data = JSON.parse(match[0]); 
  }
  return data;
}

// ==========================================
// 6. CORE SCAN PIPELINE
// ==========================================
async function doScan() {
  if (scanning || !videoEl || !videoEl.srcObject) return;
  scanning = true;
  const btn = document.getElementById('scanBtn'), lbl = document.getElementById('camLabel');
  btn.classList.add('scanning'); lbl.classList.add('scanning');
  updateCamLabel('READING TEXT/TRACKLIST...');

  try {
    const processed = await captureAndPreprocess();
    const b64 = processed.toDataURL('image/jpeg', 0.85).split(',')[1];
    const data = await callGemini(b64, PROMPT);
    
    updateCamLabel('SEARCHING DISCOGS...');
    await processAIResult(data, 'data:image/jpeg;base64,'+b64);
  } catch (e) {
    alert(e.message);
  } finally {
    scanning = false; btn.classList.remove('scanning'); lbl.classList.remove('scanning'); lbl.style.color = '';
    if (autoState === 0) updateCamLabel();
  }
}

async function processAIResult(data, b64Full) {
  const artist = data.artist || '', title = data.title || '', catalog = data.catalog || '', matrix = data.matrix || '';
  let tracks = data.tracks || [];
  const conf = parseFloat(data.confidence || 0);
  const id = 'V-' + crypto.randomUUID().substring(0, 6).toUpperCase();

  const norm = s => (s||'').toLowerCase().replace(/[^a-z0-9]/g, '');
  const isDup = records.find(r => 
    (catalog && norm(catalog) === norm(r.catalog) && norm(catalog) !== 'unknown') ||
    (matrix && norm(matrix) === norm(r.matrix) && norm(matrix) !== 'unknown') ||
    (norm(artist) === norm(r.artist) && norm(title) === norm(r.title) && norm(artist))
  );

  if (isDup) { flashColor('var(--yellow)'); updateCamLabel('Duplicate Skipped'); setTimeout(updateCamLabel, 2000); return; }

  let rec = { id, artist: artist||'Unknown', title: title||'Unknown', catalog, matrix, tracks, confidence: conf, status: 'REVIEW', rawImage: b64Full, timestamp: new Date().toISOString() };

  if (!artist && !title && !catalog && !matrix) {
    rec.title = 'Unreadable'; showScanConfirm(rec); return;
  }

  let discogsData = DISCOGS_TOKEN ? await discogsSearchFlow(artist, title, catalog, matrix, autoScanActive) : null;
  
  if (discogsData && discogsData.found) {
    rec.artist = discogsData.artist || artist; rec.title = discogsData.title || title;
    rec.discogsUrl = discogsData.discogsUrl; rec.discogsId = discogsData.releaseId;
    rec.discogsLowest = discogsData.lowestPrice; rec.discogsMedian = discogsData.medianPrice;
    rec.editionYear = discogsData.year; rec.editionCountry = discogsData.country;
    rec.thumb = discogsData.thumb; rec.genre = discogsData.discogsGenre || data.genre || 'Electronic';
    // Overwrite AI tracks with verified Discogs tracks if available
    if (discogsData.tracklist && discogsData.tracklist.length > 0) {
      rec.tracks = discogsData.tracklist;
    }
    rec.price = discogsData.medianPrice ? parseFloat(discogsData.medianPrice).toFixed(2) : (discogsData.lowestPrice ? parseFloat(discogsData.lowestPrice).toFixed(2) : '0.00');
    rec.status = 'PRICED';
  }

  showScanConfirm(rec);
}

// ==========================================
// 7. MODALS & DISCOGS API
// ==========================================
function showScanConfirm(r) {
  const m = document.getElementById('scanConfirm');
  document.getElementById('scThumb').src = r.thumb || r.rawImage || '';
  document.getElementById('scTitle').textContent = `${r.artist} - ${r.title}`;
  document.getElementById('scMeta').textContent = [r.catalog, r.matrix, r.price && r.price!=="0.00" ? '$'+r.price : ''].filter(Boolean).join(' \u2022 ');
  document.getElementById('scYear').value = r.editionYear || '';
  document.getElementById('scCountry').value = r.editionCountry || '';
  
  const bdg = document.getElementById('scBadges'); bdg.innerHTML = '';
  if (r.confidence) bdg.innerHTML += `<span class="badge" style="border-color:var(--accent); color:var(--accent);">${Math.round(r.confidence*100)}% Match</span>`;
  if (r.status === 'REVIEW') bdg.innerHTML += `<span class="badge" style="border-color:var(--yellow); color:var(--yellow);">Needs Review</span>`;
  
  // Create badges for multiple genres if they exist
  if (r.genre) {
    r.genre.split(',').forEach(g => {
      bdg.innerHTML += `<span class="badge">${g.trim()}</span>`;
    });
  }

  // Display Tracklist Preview
  const tracksEl = document.getElementById('scTracks');
  if (r.tracks && r.tracks.length > 0) {
    tracksEl.innerHTML = r.tracks.join('<br>');
    tracksEl.style.display = 'block';
  } else {
    tracksEl.style.display = 'none';
  }

  m.classList.add('show');
  
  document.getElementById('scAddBtn').onclick = () => {
    r.editionYear = document.getElementById('scYear').value;
    r.editionCountry = document.getElementById('scCountry').value;
    
    if (r.status === 'PRICED') delete r.rawImage; // Free storage
    
    records.push(r); 
    m.classList.remove('show'); 
    
    if(r.status==='PRICED') {
      flashColor(getGenreColor(r.genre));
      syncToGoogleSheets(r);
    }
    
    saveLocalRecords();
    renderLists(); 
  };
  document.getElementById('scRetryBtn').onclick = () => { m.classList.remove('show'); };
  document.getElementById('scCancelBtn').onclick = () => { m.classList.remove('show'); };
}

// Fetch Full Tracklist from Release Endpoint
async function fetchReleaseDetails(releaseId) {
  try {
    const url = `https://api.discogs.com/releases/${releaseId}?token=${DISCOGS_TOKEN}`;
    const resp = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!resp.ok) return null;
    const data = await resp.json();
    
    // Grab all styles/genres
    const allGenres = [...(data.style || []), ...(data.genre || [])];
    const uniqueGenres = [...new Set(allGenres)].join(', ');
    
    // Format tracklist
    const tracklist = (data.tracklist || []).map(t => (t.position ? t.position + ' - ' : '') + t.title);
    
    return { tracklist, genres: uniqueGenres };
  } catch (e) { return null; }
}

async function discogsSearchFlow(artist, title, catalog, matrix, wasAuto, rawQuery = null) {
  try {
    let q = rawQuery ? encodeURIComponent(rawQuery) : encodeURIComponent([catalog, matrix, artist, title].filter(Boolean).join(' '));
    const url = `https://api.discogs.com/database/search?q=${q}&type=release&format=vinyl&per_page=6&token=${DISCOGS_TOKEN}`;
    const resp = await fetch(CORS_PROXY + encodeURIComponent(url));
    if (!resp.ok) return null;
    const res = (await resp.json()).results || [];
    const vinyls = res.filter(r => r.format && r.format.some(f => f.toLowerCase().includes('vinyl')));
    if (!vinyls.length) return null;

    let rel = vinyls[0];
    if (vinyls.length > 1 && !rawQuery) {
      if(wasAuto) clearTimeout(autoScanTimer);
      rel = await askUserForEdition(vinyls);
    }

    // Now that we have the exact release, fetch the FULL tracklist and genres
    const releaseDetails = await fetchReleaseDetails(rel.id);
    const finalTracklist = releaseDetails ? releaseDetails.tracklist : [];
    const finalGenres = releaseDetails ? releaseDetails.genres : (rel.style?.[0] || rel.genre?.[0] || 'Electronic');

    const stResp = await fetch(CORS_PROXY + encodeURIComponent(`https://api.discogs.com/marketplace/stats/${rel.id}?curr_abbr=USD&token=${DISCOGS_TOKEN}`));
    const stData = stResp.ok ? await stResp.json() : {};
    
    const psResp = await fetch(CORS_PROXY + encodeURIComponent(`https://api.discogs.com/marketplace/price_suggestions/${rel.id}?token=${DISCOGS_TOKEN}`));
    const psData = psResp.ok ? await psResp.json() : {};
    const median = psData['Very Good Plus (VG+)']?.value || null;

    let fArt = artist, fTit = title;
    if (rel.title && rel.title.includes(' - ')) { fArt = rel.title.split(' - ')[0]; fTit = rel.title.split(' - ').slice(1).join(' - '); }

    return {
      found: true, releaseId: rel.id, thumb: rel.cover_image || rel.thumb || '', discogsUrl: `https://www.discogs.com${rel.uri || '/release/'+rel.id}`,
      lowestPrice: stData.lowest_price?.value?.toFixed(2)||'', medianPrice: median?.toFixed(2)||'', numForSale: stData.num_for_sale||0,
      year: rel.year||'', country: rel.country||'', discogsGenre: finalGenres, tracklist: finalTracklist, artist: fArt, title: fTit
    };
  } catch(e) { return null; }
}

function askUserForEdition(releases) {
  return new Promise((resolve) => {
    const modal = document.getElementById('editionModal');
    const list = document.getElementById('editionList');
    list.innerHTML = '<div style="text-align:center;color:var(--muted);padding:12px;">Loading tracklists...</div>';
    modal.classList.remove('hidden');

    (async () => {
      const detailsPromises = releases.map(r => fetchReleaseDetails(r.id));
      const detailsResults = await Promise.all(detailsPromises);

      list.innerHTML = '';
      releases.forEach((r, idx) => {
        const btn = document.createElement('button');
        btn.className = 'edition-btn';
        const title = r.title || 'Unknown Title';
        const year = r.year ? r.year : '?';
        const country = r.country ? r.country : '?';
        const formats = r.format ? r.format.join(', ') : 'Vinyl';
        const label = (r.label && r.label.length) ? r.label[0] : '';
        const thumb = r.cover_image || r.thumb || '';
        
        const details = detailsResults[idx];
        const tracks = details ? details.tracklist.slice(0, 8) : [];
        const trackHtml = tracks.length > 0 ? `<div class="tracklist-preview">${tracks.join('<br>')}</div>` : '';

        btn.innerHTML = `<img src="${thumb}" onerror="this.style.opacity='0'">
          <div class="edition-info">
            <strong>${year} • ${country}</strong>
            <span class="title">${title}</span>
            <span class="details">${label} | ${formats}</span>
            ${trackHtml}
          </div>`;
        btn.onclick = () => { modal.classList.add('hidden'); resolve(r); };
        list.appendChild(btn);
      });
    })();

    document.getElementById('editionSkipBtn').onclick = () => { modal.classList.add('hidden'); resolve(releases[0]); };
  });
}

// ==========================================
// 8. LIST RENDERING & DATA MANAGEMENT
// ==========================================
function renderLists() {
  const inv = document.getElementById('scanListInv'), rev = document.getElementById('scanListRev');
  Array.from(inv.children).forEach(c => { if(c.id!=='emptyStateInv') c.remove(); });
  Array.from(rev.children).forEach(c => { if(c.id!=='emptyStateRev') c.remove(); });
  let ic=0, rc=0;

  records.slice().reverse().forEach(r => {
    const el = document.createElement('div'); el.className = 'scan-item'; el.id = 'scan-'+r.id;
    if (r.status === 'REVIEW') {
      rc++;
      const sq = encodeURIComponent([r.artist!=='Unknown'?r.artist:'', r.title!=='Unreadable'?r.title:'', r.catalog, r.matrix].filter(Boolean).join(' '));
      el.innerHTML = `
        <div class="bar" style="background:var(--yellow)"></div>
        <img src="${r.rawImage||''}">
        <div class="scan-info">
          <div class="scan-artist" style="color:var(--yellow)">Review Required</div>
          <div class="scan-title">${r.artist} - ${r.title}</div>
          <div class="action-row">
            <a href="https://www.ebay.com/sch/i.html?_nkw=${sq}+vinyl" target="_blank" class="action-btn">eBay\u2197</a>
            <a href="https://www.google.com/search?q=${sq}+vinyl" target="_blank" class="action-btn">Google\u2197</a>
            <button class="action-btn" style="color:var(--accent);border-color:var(--accent);" onclick="editRecord('${r.id}')">\u270f\ufe0f Retry</button>
            <button class="action-btn" onclick="manualResolve('${r.id}')">\ud83d\udcdd Manual</button>
          </div>
        </div>
        <div class="scan-right"><button class="icon-btn del" onclick="deleteRecord('${r.id}')">\u2715</button></div>
      `;
      rev.appendChild(el);
    } else {
      ic++;
      const c = getGenreColor(r.genre);
      
      let badgeHtml = '';
      if (r.genre) {
        r.genre.split(',').slice(0,2).forEach(g => {
          badgeHtml += `<span class="badge" style="color:${c}; border-color:${c};">${g.trim()}</span>`;
        });
      }
      
      el.innerHTML = `
        <div class="bar" style="background:${c}"></div>
        <img src="${r.thumb||''}">
        <div class="scan-info">
          <div class="scan-artist">${r.artist}</div>
          <div class="scan-title">${r.title} ${r.catalog?'['+r.catalog+']':''}</div>
          <div class="scan-badges">
            ${badgeHtml}
            ${r.editionYear ? `<span class="badge">${r.editionYear} ${r.editionCountry||''}</span>` : ''}
            ${r.discogsUrl ? `<a href="${r.discogsUrl}" target="_blank" class="badge" style="text-decoration:none;">Discogs\u2197</a>` : ''}
          </div>
        </div>
        <div class="scan-right">
          <div class="icon-btn-group"><button class="icon-btn" onclick="editRecord('${r.id}')">\u270f\ufe0f</button><button class="icon-btn del" onclick="deleteRecord('${r.id}')">\u2715</button></div>
          <div class="scan-price" style="color:var(--accent);">$${r.price}</div>
        </div>
      `;
      inv.appendChild(el);
    }
  });
  
  document.getElementById('countInv').textContent = ic; document.getElementById('countRev').textContent = rc;
  document.getElementById('emptyStateInv').style.display = ic===0 ? 'flex' : 'none';
  document.getElementById('emptyStateRev').style.display = rc===0 ? 'flex' : 'none';
  
  const val = records.filter(r=>r.status!=='REVIEW').reduce((s,r)=>s+parseFloat(r.price||0),0);
  document.getElementById('scanCount').textContent = ic; document.getElementById('totalValue').textContent = val.toFixed(2);
}

async function editRecord(id) {
  const r = records.find(x => x.id === id); if(!r) return;
  const def = [r.artist!=='Unknown'?r.artist:'', r.title!=='Unreadable'?r.title:''].filter(Boolean).join(' - ');
  const q = prompt("Edit Record\nFormat: Artist - Title", def);
  if(!q) return;
  
  const dData = await discogsSearchFlow(null,null,null,null,null,false,q);
  if(dData && dData.found) {
    r.artist = dData.artist; r.title = dData.title; r.discogsUrl = dData.discogsUrl;
    r.price = dData.medianPrice || dData.lowestPrice || "0.00"; r.thumb = dData.thumb;
    r.editionYear = dData.year; r.editionCountry = dData.country; r.genre = dData.discogsGenre || r.genre;
    if (dData.tracklist && dData.tracklist.length > 0) r.tracks = dData.tracklist;
    r.status = 'PRICED';
    delete r.rawImage; 
    syncToGoogleSheets(r);
  } else { r.artist = q.split('-')[0]||q; r.title = q.split('-')[1]||''; }
  saveLocalRecords(); renderLists();
}

function manualResolve(id) {
  const r = records.find(x => x.id === id); if(!r) return;
  const def = [r.artist!=='Unknown'?r.artist:'', r.title!=='Unreadable'?r.title:''].filter(Boolean).join(' - ');
  const q = prompt("Manual Add\nFormat: Artist - Title | Price", def + " | 5.00");
  if(!q) return;
  const p = q.split('|');
  r.artist = p[0].split('-')[0]?.trim()||p[0]; r.title = p[0].split('-')[1]?.trim()||'';
  r.price = p[1] ? parseFloat(p[1]).toFixed(2) : "5.00"; r.status = 'MANUAL';
  delete r.rawImage; 
  
  syncToGoogleSheets(r);
  saveLocalRecords(); renderLists();
}

function deleteRecord(id) { 
  records.splice(records.findIndex(r=>r.id===id), 1); 
  saveLocalRecords(); renderLists(); 
}

function clearAll() { 
  if(confirm('Clear all items?')) { records.length=0; saveLocalRecords(); renderLists(); } 
}

function downloadCSV() {
  const uniq = records.filter(r => r.status!=='REVIEW'); if(!uniq.length) return;
  
  // Export using the E-Commerce Header format
  const rows = [['Variant SKU','Vendor','Title','Variant Price','Tags','Body HTML','Image Src','Year','Country']];
  
  uniq.forEach(r => {
    const formattedTracks = (r.tracks && r.tracks.length > 0) ? r.tracks.join('<br>') : "";
    const sku = r.catalog || r.matrix || "";
    
    rows.push([
      `"${sku}"`, 
      `"${r.artist}"`, 
      `"${r.title}"`, 
      r.price, 
      `"${r.genre}"`, 
      `"${formattedTracks}"`, 
      `"${r.thumb || ''}"`,
      r.editionYear, 
      r.editionCountry
    ]);
  });
  
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([rows.map(e=>e.join(',')).join('\n')], {type:'text/csv'}));
  a.download = `vinylshop_ecommerce_export_${new Date().toISOString().split('T')[0]}.csv`; a.click();
}
